# ================================================================
# Laptop Store — Optimized Production Configuration
# ================================================================

# ================================================================
# Server
# ================================================================
server.port=8080
server.servlet.context-path=/

# Tomcat Thread Pool — hỗ trợ ~100 CCU
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=20
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20000

# HTTP Compression — giảm kích thước JSON response cho Android mobile
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css
server.compression.min-response-size=2048

# ================================================================
# Database — Railway MySQL
# ================================================================
spring.datasource.url=jdbc:mysql://10.80.246.224:3306/laptopstoredb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================================================
# HikariCP — Tối ưu cho Railway MySQL + 100 CCU
# ================================================================
spring.datasource.hikari.pool-name=LaptopStorePool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000

# ================================================================
# JPA / Hibernate
# ================================================================
# validate — kiểm tra schema lúc startup, không auto-modify trong production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Batch Processing — gộp INSERT/UPDATE thành batch, giảm network round-trips với Railway
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Query Plan Cache — giảm thời gian parse JPQL
spring.jpa.properties.hibernate.query.plan_cache_max_size=2048
spring.jpa.properties.hibernate.query.plan_parameter_metadata_max_size=128
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# ================================================================
# JWT
# ================================================================
app.jwt.secret=LaptopStoreSecretKeyForJWTAuthenticationMustBeAtLeast256BitsLongForHS256Algorithm2024
app.jwt.expiration-ms=360000000
app.jwt.refresh-expiration-ms=60480000000

# ================================================================
# File Upload
# ================================================================
app.file.upload-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# ================================================================
# Logging — Production Level (giảm I/O log)
# ================================================================
logging.level.root=WARN
logging.level.com.laptopstore=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ================================================================
# Swagger / OpenAPI
# ================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ================================================================
# Jackson — Tối ưu JSON serialization cho mobile
# ================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
# NON_NULL: bỏ qua các field null — giảm kích thước JSON response
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.serialization.fail-on-empty-beans=false
